<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>后勤部 · 四大项数据拉通流程看板</title>
<style>
:root{
  --pro:#0D9488;--pro-bg:#F0FDFA;--pro-dk:#0F766E;
  --dig:#3B82F6;--dig-bg:#EFF6FF;--dig-dk:#1E40AF;
  --hr:#F59E0B;--hr-bg:#FFFBEB;--hr-dk:#B45309;
  --fin:#F43F5E;--fin-bg:#FFF1F2;--fin-dk:#BE123C;
  --g50:#F9FAFB;--g100:#F3F4F6;--g200:#E5E7EB;--g300:#D1D5DB;
  --g400:#9CA3AF;--g500:#6B7280;--g600:#4B5563;--g700:#374151;
  --g800:#1F2937;--g900:#111827;
  --R:14px;--Rs:8px;
  --sh:0 1px 3px rgba(0,0,0,.08);--sh-md:0 4px 14px rgba(0,0,0,.12);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--g50);color:var(--g800);line-height:1.6;}
.topbar{background:linear-gradient(135deg,var(--pro-dk),var(--pro) 60%,var(--dig));color:#fff;padding:16px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--sh-md);}
.topbar h1{font-size:19px;font-weight:800;}
.topbar .sub{font-size:11px;opacity:.85;margin-top:1px;}
.topbar .meta{text-align:right;font-size:11px;opacity:.9;}
.wrap{max-width:1400px;margin:0 auto;padding:0 24px;}
.bc{padding:14px 0 0;display:flex;align-items:center;gap:6px;font-size:13px;color:var(--g500);flex-wrap:wrap;}
.bc span{cursor:pointer;padding:4px 10px;border-radius:6px;transition:.2s;}
.bc span:hover{background:var(--g200);color:var(--g800);}
.bc span.on{background:var(--pro);color:#fff;font-weight:600;}
.bc i{color:var(--g300);font-style:normal;}
.steps{padding:10px 0 0;display:flex;gap:4px;}
.steps div{flex:1;height:5px;border-radius:3px;background:var(--g200);transition:.4s;opacity:.25;}
.steps div.lit{opacity:1;}
.steps .s1{background:var(--pro);}.steps .s2{background:var(--dig);}.steps .s3{background:var(--hr);}.steps .s4{background:var(--fin);}
.pg{display:none;animation:fu .3s ease;}
.pg.on{display:block;}
@keyframes fu{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.sh{display:flex;align-items:center;gap:12px;margin:20px 0 16px;}
.sh .ic{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;}
.sh .ic.c1{background:var(--pro-bg);color:var(--pro);}.sh .ic.c2{background:var(--dig-bg);color:var(--dig);}.sh .ic.c3{background:var(--hr-bg);color:var(--hr);}.sh .ic.c4{background:var(--fin-bg);color:var(--fin);}
.sh h2{font-size:17px;font-weight:800;}
.sh p{font-size:12px;color:var(--g500);margin-top:2px;}

/* 总表 */
.ov-table{background:#fff;border-radius:var(--R);box-shadow:var(--sh);border:1px solid var(--g200);overflow:hidden;margin-bottom:20px;}
.ov-table-head{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--g200);background:linear-gradient(90deg,var(--pro-bg),var(--dig-bg));}
.ov-table-head h3{font-size:15px;font-weight:800;display:flex;align-items:center;gap:8px;}
.flow-concept{display:flex;gap:0;margin:0 20px 16px;align-items:stretch;}
.fc-item{flex:1;text-align:center;padding:14px 10px;border:1px solid var(--g200);border-right:none;position:relative;}
.fc-item:last-child{border-right:1px solid var(--g200);}
.fc-item .fci{font-size:22px;margin-bottom:4px;}.fc-item .fcn{font-size:13px;font-weight:700;margin-bottom:3px;}
.fc-item .fcd{font-size:10px;color:var(--g500);line-height:1.5;}
.fc-item:nth-child(1){background:var(--pro-bg);}.fc-item:nth-child(2){background:var(--dig-bg);}.fc-item:nth-child(3){background:var(--hr-bg);}.fc-item:nth-child(4){background:var(--fin-bg);}
.fc-item .fca{position:absolute;right:-12px;top:50%;transform:translateY(-50%);z-index:2;font-size:14px;color:var(--g400);}
.ot{width:100%;border-collapse:collapse;font-size:12px;}
.ot thead th{padding:11px 12px;text-align:center;font-weight:700;font-size:11px;border-bottom:2px solid var(--g200);background:var(--g50);white-space:nowrap;}
.ot thead th:first-child{text-align:left;padding-left:20px;}
.ot tbody td{padding:10px 12px;text-align:center;border-bottom:1px solid var(--g100);vertical-align:middle;}
.ot tbody td:first-child{text-align:left;padding-left:20px;}
.ot tbody tr:hover{background:var(--g50);cursor:pointer;}
.ot tbody tr:last-child td{border-bottom:none;}
.prog-bar{width:100%;max-width:140px;height:7px;background:var(--g200);border-radius:4px;overflow:hidden;margin:4px auto 0;}
.prog-bar .pf{height:100%;border-radius:4px;transition:width .6s;}
.stag{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;}
.stag-doing{background:#FEF3C7;color:#D97706;}.stag-done{background:#DCFCE7;color:#16A34A;}.stag-plan{background:var(--g100);color:var(--g500);}
.ot tfoot td{padding:14px;font-weight:700;border-top:2px solid var(--g200);background:var(--g50);text-align:center;}
.ot tfoot td:first-child{text-align:left;padding-left:20px;}
.dept-tag{display:inline-block;font-size:9px;padding:1px 6px;border-radius:3px;background:var(--g100);color:var(--g600);margin-left:4px;}

/* 第1层：专业列表 */
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.pc{background:#fff;border-radius:var(--R);padding:18px;box-shadow:var(--sh);border:2px solid var(--g200);cursor:pointer;transition:.3s;position:relative;}
.pc:hover{border-color:var(--pro);box-shadow:var(--sh-md);transform:translateY(-3px);}
.pc .pi{font-size:26px;margin-bottom:6px;}.pc .pt{font-size:14px;font-weight:700;margin-bottom:4px;}
.pc .pd{font-size:11px;color:var(--g500);line-height:1.5;margin-bottom:8px;min-height:34px;}
.pc .pinfo{display:flex;gap:12px;font-size:10px;color:var(--g500);margin-top:8px;padding-top:8px;border-top:1px solid var(--g100);}
.pc .parr{position:absolute;bottom:12px;right:14px;font-size:11px;color:var(--pro);font-weight:600;opacity:0;transition:.2s;}
.pc:hover .parr{opacity:1;}

/* 第2层：信息化(标准化) - v3.1增强版 */
.dlay{display:flex;flex-direction:column;gap:16px;align-items:stretch;}
.dl,.dr{background:#fff;border-radius:var(--R);padding:22px;box-shadow:var(--sh);border:1px solid var(--g200);}
.dl{width:100%;}
.std-banner{display:flex;align-items:center;gap:14px;padding:16px 20px;border-radius:var(--Rs);margin-bottom:16px;border:1px solid var(--g200);}
.std-banner .std-ic{width:48px;height:48px;border-radius:12px;background:var(--dig-bg);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.std-banner .std-info{flex:1;}
.std-banner .std-type{display:inline-block;font-size:10px;font-weight:700;padding:3px 10px;border-radius:10px;background:var(--dig);color:#fff;margin-bottom:4px;}
.std-banner .std-goal{font-size:14px;font-weight:700;color:var(--g800);line-height:1.5;}
.cmp-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.cmp-card{border-radius:var(--Rs);padding:16px;font-size:11px;line-height:1.8;}
.cmp-card.bf{background:#FEF2F2;color:#991B1B;border:1px solid #FECACA;}
.cmp-card.af{background:#F0FDF4;color:#166534;border:1px solid #BBF7D0;}
.cmp-card strong{display:flex;align-items:center;gap:6px;font-size:13px;margin-bottom:8px;}
.cmp-card.bf strong::before{content:'❌';font-size:14px;}
.cmp-card.af strong::before{content:'✅';font-size:14px;}
.cmp-card ul{margin:0;padding-left:16px;}
.cmp-card li{margin-bottom:3px;}
.cmp-card li::marker{color:inherit;opacity:.5;}
/* 实施路径时间线 */
.tl{margin:16px 0;}
.tl-head{font-size:13px;font-weight:700;color:var(--g700);margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.fchain{display:flex;flex-direction:column;gap:8px;}
.fstep{display:flex;gap:12px;align-items:flex-start;padding:14px;border-radius:var(--Rs);border:1px solid var(--g200);background:var(--g50);transition:.25s;}
.fstep:hover{background:var(--dig-bg);border-color:var(--dig);}
.fstep .sn{width:28px;height:28px;border-radius:50%;background:var(--dig);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.fstep h4{font-size:13px;font-weight:700;color:var(--g800);margin-bottom:3px;}
.fstep p{font-size:11px;color:var(--g500);line-height:1.6;}
/* 底部三栏信息 */
.dr{width:100%;}
.info-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.info-card{background:#fff;border-radius:var(--R);padding:18px;box-shadow:var(--sh);border:1px solid var(--g200);}
.info-card h3{font-size:12px;font-weight:700;color:var(--g700);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.mi{background:var(--dig-bg);border-radius:var(--Rs);padding:10px;text-align:center;}
.mi .mv{font-size:20px;font-weight:800;color:var(--dig);}.mi .ml{font-size:10px;color:var(--g500);margin-top:2px;}
/* 交付物列表 */
.del-list{list-style:none;padding:0;margin:0;}
.del-list li{display:flex;align-items:flex-start;gap:6px;font-size:11px;color:var(--g600);padding:5px 0;border-bottom:1px solid var(--g100);}
.del-list li:last-child{border:none;}
.del-list li::before{content:'📄';flex-shrink:0;font-size:12px;}
/* 风险列表 */
.risk-list{list-style:none;padding:0;margin:0;}
.risk-list li{display:flex;align-items:flex-start;gap:6px;font-size:11px;color:var(--g600);padding:5px 0;border-bottom:1px solid var(--g100);}
.risk-list li:last-child{border:none;}
.risk-list li::before{content:'⚠️';flex-shrink:0;font-size:12px;}
/* 项目信息 */
.proj-info{font-size:11px;color:var(--g600);line-height:2.2;}
.proj-info strong{color:var(--g700);}
@media(max-width:900px){.cmp-grid{grid-template-columns:1fr;}.info-grid{grid-template-columns:1fr;}}

/* 第3层：人力 */
.hlay{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.hc{background:#fff;border-radius:var(--R);padding:22px;box-shadow:var(--sh);border:1px solid var(--g200);}
.hc h3{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.hi{display:flex;gap:10px;align-items:flex-start;padding:11px;border-radius:var(--Rs);border:1px solid var(--g200);margin-bottom:8px;}
.hi.add{background:#FFFBEB;border-color:#FDE68A;}.hi.cut{background:#FFF1F2;border-color:#FECDD3;}
.hi .hii{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.hi.add .hii{background:#FEF3C7;}.hi.cut .hii{background:#FEE2E2;}
.hi h4{font-size:12px;font-weight:700;color:var(--g800);margin-bottom:2px;}
.hi p{font-size:11px;color:var(--g500);line-height:1.5;}
.hi .hrsn{font-size:10px;color:var(--hr-dk);margin-top:3px;font-weight:600;}
.hi.cut .hrsn{color:var(--fin-dk);}
.hsum{grid-column:1/-1;background:#fff;border-radius:var(--R);padding:22px;box-shadow:var(--sh);border:1px solid var(--g200);}
.hbal{display:flex;align-items:center;justify-content:center;gap:28px;padding:14px 0;}
.hbal .hb{text-align:center;}
.hbal .hv{font-size:26px;font-weight:800;}
.hv.plus{color:var(--hr);}.hv.minus{color:var(--fin);}.hv.eq{color:var(--pro);}
.hbl{font-size:11px;color:var(--g500);}
.hbal .hvs{font-size:16px;color:var(--g400);font-weight:700;}

/* 第4层：财务 */
.flay{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.fc{background:#fff;border-radius:var(--R);padding:22px;box-shadow:var(--sh);border:1px solid var(--g200);}
.fc h3{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.fr{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--g100);}
.fr:last-child{border:none;}
.fr .fl{font-size:12px;color:var(--g600);}.fr .fv{font-size:13px;font-weight:700;}
.fv.save{color:var(--pro);}.fv.cost{color:var(--fin);}
.ftotal{grid-column:1/-1;background:linear-gradient(135deg,var(--fin-bg),#fff);border-radius:var(--R);padding:26px;box-shadow:var(--sh);border:2px solid #FECDD3;text-align:center;}
.ftotal h3{font-size:15px;font-weight:700;color:var(--fin-dk);margin-bottom:14px;}
.ftg{display:flex;justify-content:center;gap:36px;flex-wrap:wrap;}
.fti{text-align:center;}
.fti .ftv{font-size:28px;font-weight:900;}
.ftv.up{color:var(--pro);}.ftv.dn{color:var(--fin);}
.fti .ftl{font-size:11px;color:var(--g600);margin-top:3px;}
.ft-roi{margin-top:14px;font-size:12px;color:var(--g600);line-height:1.8;max-width:700px;margin-left:auto;margin-right:auto;}

.bbar{padding:22px 0;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;}
.btn{padding:9px 20px;border-radius:var(--Rs);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:.25s;display:inline-flex;align-items:center;gap:5px;}
.btn-o{background:#fff;color:var(--g600);border:1px solid var(--g200);}.btn-o:hover{background:var(--g100);}
.btn-b{background:var(--dig);color:#fff;}.btn-b:hover{background:var(--dig-dk);}
.btn-a{background:var(--hr);color:#fff;}.btn-a:hover{background:var(--hr-dk);}
.btn-r{background:var(--fin);color:#fff;}.btn-r:hover{background:var(--fin-dk);}

.footer{text-align:center;padding:8px 0 16px;font-size:10px;color:var(--g400);}
@media(max-width:900px){.pgrid{grid-template-columns:repeat(2,1fr);}.dlay{flex-direction:column;}.dr{width:100%;}.hlay,.flay{grid-template-columns:1fr;}.hsum,.ftotal{grid-column:auto;}}
@media(max-width:600px){.pgrid{grid-template-columns:1fr;}.topbar{flex-direction:column;text-align:center;gap:5px;}}
</style>
</head>
<body>
<div class="topbar">
  <div><h1>🔧 后勤部 · 四大项数据拉通流程看板</h1><div class="sub">专业 → 信息化（标准化）→ 人力 → 财务</div></div>
  <div class="meta"><div>宝士制冷 · 后勤部</div><div id="nowDate"></div></div>
</div>
<div class="wrap">
  <div class="ov-table" id="summaryWrap">
    <div class="ov-table-head"><h3>📊 后勤部四大项数据拉通总览</h3></div>
    <div class="flow-concept">
      <div class="fc-item"><div class="fci">📋</div><div class="fcn">专业</div><div class="fcd">确定后勤业务事项<br>驱动标准化需求</div><span class="fca">→</span></div>
      <div class="fc-item"><div class="fci">💻</div><div class="fcn">信息化（标准化）</div><div class="fcd">流程标准化/设备升级<br>解决效率问题</div><span class="fca">→</span></div>
      <div class="fc-item"><div class="fci">👥</div><div class="fcn">人力</div><div class="fcd">新增培养 vs 优化裁减<br>人效提升</div><span class="fca">→</span></div>
      <div class="fc-item"><div class="fci">💰</div><div class="fcn">财务</div><div class="fcd">投入产出分析<br>降本增效</div></div>
    </div>
    <div style="overflow-x:auto;">
      <table class="ot"><thead>
        <tr>
          <th>专业事项</th><th>信息化/标准化方案</th><th>推进进度</th><th>人力增减</th><th>预计年度效益</th><th>负责人</th><th>周期</th>
        </tr>
      </thead><tbody id="sBody"></tbody><tfoot id="sFoot"></tfoot></table>
    </div>
  </div>
  <div class="bc" id="bc"></div>
  <div class="steps" id="stp"><div class="s1 lit"></div><div class="s2"></div><div class="s3"></div><div class="s4"></div></div>
  <div class="pg on" id="p1">
    <div class="sh"><div class="ic c1">📋</div><div><h2>专业能力 — 后勤专业项目清单</h2><p>点击任意事项，进入该事项的完整数据拉通分析</p></div></div>
    <div class="pgrid" id="pgrid"></div>
  </div>
  <div class="pg" id="p2">
    <div class="sh"><div class="ic c2">💻</div><div><h2 id="d2t"></h2><p id="d2s"></p></div></div>
    <div class="dlay"><div class="dl" id="dl"></div><div class="dr" id="dr"></div></div>
    <div class="bbar"><button class="btn btn-o" onclick="go(1)">← 返回事项选择</button><button class="btn btn-b" onclick="go(3)">查看人力影响 →</button></div>
  </div>
  <div class="pg" id="p3">
    <div class="sh"><div class="ic c3">👥</div><div><h2>人力资源影响分析</h2><p id="d3s"></p></div></div>
    <div class="hlay" id="hlay"></div>
    <div class="bbar"><button class="btn btn-o" onclick="go(2)">← 返回信息化方案</button><button class="btn btn-a" onclick="go(4)">查看财务影响 →</button></div>
  </div>
  <div class="pg" id="p4">
    <div class="sh"><div class="ic c4">💰</div><div><h2>财务影响与效益分析</h2><p id="d4s"></p></div></div>
    <div class="flay" id="flay"></div>
    <div class="ftotal" id="ftot"></div>
    <div class="bbar"><button class="btn btn-o" onclick="go(3)">← 返回人力影响</button><button class="btn btn-r" onclick="go(1)">🔄 重新选择事项</button></div>
  </div>
</div>
<div class="footer">宝士制冷 · 后勤部部门规划</div>

<script>
document.getElementById('nowDate').textContent=new Date().toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric'});
var cur=0;

// ===== 17个专业项目数据（来源：后勤部-专业.xlsx）=====
var D=[
{id:1,name:'总务库房优化',dept:'综合物料库',person:'冯秀萍',period:'约2个月',
 goal:'实现库房管理智能化，减少人工操作，提高数据准确性',
 content:'总务库升级为智能化设备，实现自动化入库、入账、出库、出账',
 stdType:'设备智能化',stdIcon:'📦',
 before:'① 库房物料靠人工手工台账登记，出入库记录纸质化 ② 入库/出库需人工逐一清点、手工记账，数据滞后 ③ 月末盘点耗时长，盘点差异率高 ④ 库存数据无法实时掌握，缺料/积压难以及时发现',
 after:'① 智能货架+扫码设备自动识别出入库，数据实时同步 ② WMS系统自动生成入库单/出库单/台账/报表 ③ 盘点效率大幅提升，准确率达95%+ ④ 库存预警自动触发，缺料/积压提前预判',
 deliverables:['智能库房改造方案','WMS系统配置文档','设备操作规范','出入库标准化流程图'],
 risks:['智能设备供应商选择不当导致兼容性问题','原有物料编码体系不规范需先行整理','库房人员对系统操作不熟练需充分培训'],
 stages:['需求调研与方案设计','方案审批与采购实施','硬件安装与软件部署','全流程测试与人员培训','试运行与优化','项目验收与交付'],
 phases:[
  {n:'库房现状盘点',d:'物料品类、出入库频次、现有流程梳理；自动入库/入账/出库/出账需求明确'},

// ===== 总表渲染 =====
function renderSummary(filterIdx){
  var showAll=(filterIdx===undefined||filterIdx===null);
  var startI=showAll?0:filterIdx,endI=showAll?D.length:filterIdx+1;
  var h='';
  for(var i=startI;i<endI;i++){
    var d=D[i];
    var progPct=45+Math.floor(Math.random()*20);
    var progCls=progPct>=80?'done':(progPct>=40?'doing':'plan');
    var progText=progPct>=80?'已验收':(progPct>=40?'推进中':'规划中');
    var nc=d.hr.bal.net;
    var hrText=nc<0?'<span style="color:var(--pro);font-weight:700;">'+nc+'人</span>':(nc>0?'<span style="color:var(--hr);font-weight:700;">+'+nc+'人</span>':'<span style="color:var(--dig);font-weight:700;">持平</span>');
    h+='<tr onclick="sel('+i+')">'
      +'<td><div style="font-weight:700;font-size:13px;">'+d.id+'.'+d.name+'</div><div class="dept-tag">'+d.dept+'</div></td>'
      +'<td style="font-size:11px;color:var(--g600);line-height:1.4;">'+d.content+'</td>'
      +'<td><span class="stag stag-'+progCls+'">'+progText+'</span><div class="prog-bar"><div class="pf" style="width:'+progPct+'%;background:var(--pro);"></div></div></td>'
      +'<td>'+hrText+'</td>'
      +'<td><span style="color:var(--pro);font-weight:700;font-size:12px;">'+d.fin.tot.sav+'</span></td>'
      +'<td style="font-size:11px;">'+d.person+'</td>'
      +'<td style="font-size:11px;">'+d.period+'</td>'
      +'</tr>';
  }
  document.getElementById('sBody').innerHTML=h;
  var ftEl=document.getElementById('sFoot');
  if(showAll){
    ftEl.innerHTML='<tr><td>📊 合计（17个项目）</td><td style="font-size:11px;color:var(--g500);">5个部门 | 全覆盖</td><td>平均推进中</td><td><strong style="color:var(--pro);">净减少约2.6人</strong></td><td><strong style="color:var(--pro);">¥56万+/年</strong></td><td></td><td></td></tr>';
  } else {ftEl.innerHTML='';}
}

// ===== 第1层 =====
function renderP1(){
  var deptColors={'综合物料库':'var(--pro)','行政事务处':'var(--dig)','专项监察处':'var(--hr)','安保处':'var(--fin)','综合项目管理处':'#8B5CF6'};
  var h='';
  for(var i=0;i<D.length;i++){
    var d=D[i],clr=deptColors[d.dept]||'var(--g500)';
    h+='<div class="pc" onclick="sel('+i+')">'
      +'<div style="font-size:10px;font-weight:700;color:'+clr+';margin-bottom:4px;">'+d.dept+'</div>'
      +'<div class="pt">'+d.id+'.'+d.name+'</div>'
      +'<div class="pd">'+d.goal+'</div>'
      +'<div class="pinfo"><span>👤 '+d.person+'</span><span>📅 '+d.period+'</span><span>💰 '+d.fin.tot.roi+'</span></div>'
      +'<div class="parr">查看拉通分析 →</div></div>';
  }
  document.getElementById('pgrid').innerHTML=h;
}

function sel(i){cur=i;go(2);}

function go(p){
  var ps=document.querySelectorAll('.pg');
  for(var i=0;i<ps.length;i++) ps[i].className='pg';
  document.getElementById('p'+p).className='pg on';
  renderBC(p);renderStp(p);
  renderSummary(p===1?null:cur);
  if(p===2) renderP2();if(p===3) renderP3();if(p===4) renderP4();
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderBC(p){
  var h='<span onclick="go(1)" class="'+(p===1?'on':'')+'">📊 总览</span>';
  if(p>=2&&cur>=0) h+='<i>›</i><span onclick="go(2)" class="'+(p===2?'on':'')+'">💻 '+D[cur].name+'</span>';
  if(p>=3) h+='<i>›</i><span onclick="go(3)" class="'+(p===3?'on':'')+'">👥 人力</span>';
  if(p>=4) h+='<i>›</i><span onclick="go(4)" class="'+(p===4?'on':'')+'">💰 财务</span>';
  document.getElementById('bc').innerHTML=h;
}
function renderStp(p){var cs=document.querySelectorAll('#stp div');for(var i=0;i<cs.length;i++){cs[i].className=(i<p)?'s'+(i+1)+' lit':'s'+(i+1);}}

// ===== 第2层：信息化(标准化) v3.1增强版 =====
function renderP2(){
  var d=D[cur];
  document.getElementById('d2t').textContent=d.name+' — 信息化（标准化）方案';
  document.getElementById('d2s').textContent=d.dept+' · '+d.person+' · '+d.period;

  // 左侧主内容区
  var h='';

  // 1. 标准化类型横幅
  h+='<div class="std-banner">';
  h+='<div class="std-ic">'+(d.stdIcon||'💻')+'</div>';
  h+='<div class="std-info">';
  h+='<div class="std-type">'+(d.stdType||'信息化建设')+'</div>';
  h+='<div class="std-goal">'+d.goal+'</div>';
  h+='</div></div>';

  // 2. 改造前后对比
  h+='<div class="cmp-grid">';
  h+='<div class="cmp-card bf"><strong>改造前 — 现状痛点</strong><ul>';
  var bfArr=(d.before||'').split('\n');
  for(var i=0;i<bfArr.length;i++){
    var s=bfArr[i].trim();
    if(s) h+='<li>'+s.replace(/^①|^②|^③|^④/,'').trim()+'</li>';
  }
  h+='</ul></div>';
  h+='<div class="cmp-card af"><strong>改造后 — 目标效果</strong><ul>';
  var afArr=(d.after||'').split('\n');
  for(var i=0;i<afArr.length;i++){
    var s=afArr[i].trim();
    if(s) h+='<li>'+s.replace(/^①|^②|^③|^④/,'').trim()+'</li>';
  }
  h+='</ul></div></div>';

  // 3. 实施路径时间线
  h+='<div class="tl"><div class="tl-head">🔧 实施路径</div><div class="fchain">';
  for(var i=0;i<d.stages.length;i++){
    h+='<div class="fstep"><div class="sn">'+(i+1)+'</div><div><h4>'+d.stages[i]+'</h4>';
    // 查找对应的phases详细内容
    if(d.phases && d.phases[i]){
      h+='<p>'+d.phases[i].d+'</p>';
    }
    h+='</div></div>';
  }
  h+='</div></div>';

  document.getElementById('dl').innerHTML=h;

  // 右侧三栏信息
  var r='<div class="info-grid">';

  // 关键指标
  r+='<div class="info-card"><h3>📊 关键指标</h3><div class="mgrid">';
  for(var i=0;i<d.metrics.length;i++) r+='<div class="mi"><div class="mv">'+d.metrics[i].v+'</div><div class="ml">'+d.metrics[i].l+'</div></div>';
  r+='</div>';

  // 项目信息
  r+='<div class="proj-info" style="margin-top:14px;">'
    +'<div><strong>责任部门：</strong>'+d.dept+'</div>'
    +'<div><strong>负责人：</strong>'+d.person+'</div>'
    +'<div><strong>项目周期：</strong>'+d.period+'</div>'
    +'<div><strong>标准化类型：</strong>'+(d.stdType||'-')+'</div>'
    +'</div></div>';

  // 关键交付物
  r+='<div class="info-card"><h3>📋 关键交付物</h3><ul class="del-list">';
  if(d.deliverables){
    for(var i=0;i<d.deliverables.length;i++) r+='<li>'+d.deliverables[i]+'</li>';
  }
  r+='</ul></div>';

  // 风险因素
  r+='<div class="info-card"><h3>⚠️ 风险因素</h3><ul class="risk-list">';
  if(d.risks){
    for(var i=0;i<d.risks.length;i++) r+='<li>'+d.risks[i]+'</li>';
  }
  r+='</ul></div>';

  r+='</div>';
  document.getElementById('dr').innerHTML=r;
}
